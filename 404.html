<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — vojta@konopa: ~/lost+found</title>
  <meta name="description" content="404 — Page not found." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f0a;
      --bg-window: #0f1410;
      --bg-chrome: #161c17;
      --fg: #c8facc;
      --fg-dim: #6f8a72;
      --accent: #33ff7a;
      --amber: #ffb454;
      --red: #ff5f56;
      --yellow: #ffbd2e;
      --green: #27c93f;
      --error: #ff6b5e;
      --border: #1f2a21;
      --shadow: 0 0 40px rgba(51, 255, 122, 0.08), 0 0 1px rgba(51, 255, 122, 0.2);
      --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* CRT scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.015) 0px,
        rgba(255, 255, 255, 0.015) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 1;
    }
    /* vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }

    main {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .terminal {
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .chrome {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-chrome);
      border-bottom: 1px solid var(--border);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot.r { background: var(--red); }
    .dot.y { background: var(--yellow); }
    .dot.g { background: var(--green); }
    .title {
      margin-left: auto;
      margin-right: auto;
      font-size: 12px;
      color: var(--fg-dim);
      letter-spacing: 0.5px;
    }

    .screen {
      padding: 24px 22px 28px;
      min-height: 320px;
    }

    .line { white-space: pre-wrap; word-wrap: break-word; }
    .prompt { color: var(--accent); }
    .prompt .user { color: var(--accent); }
    .prompt .at   { color: var(--fg-dim); }
    .prompt .host { color: var(--amber); }
    .prompt .path { color: var(--fg-dim); }
    .prompt .sym  { color: var(--fg); }
    .cmd { color: var(--fg); }
    .out { color: var(--fg); margin: 0; }
    .err { color: var(--error); }
    .dim { color: var(--fg-dim); }
    .accent { color: var(--accent); }
    .amber { color: var(--amber); }

    .block { margin: 10px 0 18px; }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed transparent;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    a:hover, a:focus { color: var(--amber); border-bottom-color: var(--amber); outline: none; }
    a:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 2px; }

    /* big 404 banner */
    .banner-404 {
      font-family: var(--mono);
      font-weight: 700;
      font-size: clamp(48px, 12vw, 96px);
      color: var(--error);
      letter-spacing: 0.05em;
      line-height: 1;
      margin: 4px 0 6px;
      text-shadow: 0 0 28px rgba(255, 107, 94, 0.35);
    }
    .banner-sub {
      color: var(--fg-dim);
      font-size: 13px;
      margin: 0 0 8px;
    }

    /* blinking caret */
    @keyframes blink { 50% { opacity: 0; } }
    .caret {
      display: inline-block;
      width: 9px;
      height: 1.05em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }
    @media (prefers-reduced-motion: reduce) { .caret { animation: none; } }

    @media (max-width: 540px) {
      main { padding: 24px 12px 60px; }
      .screen { padding: 20px 16px; }
      body { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="terminal" aria-label="404 — page not found">
      <header class="chrome" aria-hidden="true">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <span class="title">vojta@konopa: ~/lost+found</span>
      </header>

      <div class="screen" id="screen">
        <noscript>
          <div class="block">
            <div class="line"><span class="prompt"><span class="user">vojta</span><span class="at">@</span><span class="host">konopa</span><span class="path">:~</span><span class="sym">$</span></span> <span class="cmd">ls /the/page/you/wanted</span></div>
            <p class="out err">ls: cannot access '/the/page/you/wanted': No such file or directory</p>
          </div>
          <div class="block">
            <div class="line"><span class="prompt"><span class="user">vojta</span><span class="at">@</span><span class="host">konopa</span><span class="path">:~</span><span class="sym">$</span></span> <span class="cmd">curl -I &lt;url&gt;</span></div>
            <div class="banner-404">404</div>
            <p class="banner-sub">HTTP/1.1 404 Not Found</p>
          </div>
          <div class="block">
            <div class="line"><span class="prompt"><span class="user">vojta</span><span class="at">@</span><span class="host">konopa</span><span class="path">:~</span><span class="sym">$</span></span> <span class="cmd">cat /var/log/joke.txt</span></div>
            <p class="out accent">HAHAA, what were you looking for you fool!</p>
          </div>
          <div class="block">
            <div class="line"><span class="prompt"><span class="user">vojta</span><span class="at">@</span><span class="host">konopa</span><span class="path">:~</span><span class="sym">$</span></span> <span class="cmd"><a href="/">cd ~</a></span></div>
            <p class="out dim">→ <a href="/">take me home</a></p>
          </div>
        </noscript>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const screen = document.getElementById('screen');
      if (!screen) return;

      const PROMPT_HTML =
        '<span class="prompt"><span class="user">vojta</span><span class="at">@</span><span class="host">konopa</span><span class="path">:~</span><span class="sym">$</span></span> ';

      const steps = [
        { type: 'prompt', cmd: 'ls /the/page/you/wanted' },
        {
          type: 'reveal',
          html: '<p class="out err">ls: cannot access \'/the/page/you/wanted\': No such file or directory</p>'
        },
        { type: 'prompt', cmd: 'curl -I <url>' },
        {
          type: 'reveal',
          html: '<div class="banner-404">404</div><p class="banner-sub">HTTP/1.1 404 Not Found</p>'
        },
        { type: 'prompt', cmd: 'cat /var/log/joke.txt' },
        {
          type: 'typeOut',
          className: 'out accent',
          text: 'HAHAA, what were you looking for you fool!'
        },
        { type: 'prompt', cmd: 'cd ~' },
        {
          type: 'reveal',
          html: '<p class="out dim">→ <a href="/">take me home</a></p>'
        }
      ];

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const TYPE_SPEED = reduceMotion ? 0 : 38;
      const TEXT_SPEED = reduceMotion ? 0 : 18;
      const PAUSE_AFTER_CMD = reduceMotion ? 0 : 220;
      const PAUSE_BETWEEN = reduceMotion ? 0 : 320;

      const caret = document.createElement('span');
      caret.className = 'caret';

      function sleep(ms) { return new Promise((res) => setTimeout(res, ms)); }

      async function typeInto(el, text, speed) {
        for (let i = 0; i < text.length; i++) {
          el.appendChild(document.createTextNode(text[i]));
          if (speed > 0) await sleep(speed);
        }
      }

      async function runStep(step) {
        const block = document.createElement('div');
        block.className = 'block';
        screen.appendChild(block);

        if (step.type === 'prompt') {
          const line = document.createElement('div');
          line.className = 'line';
          line.innerHTML = PROMPT_HTML;
          const cmd = document.createElement('span');
          cmd.className = 'cmd';
          line.appendChild(cmd);
          line.appendChild(caret);
          block.appendChild(line);
          await typeInto(cmd, step.cmd, TYPE_SPEED);
          await sleep(PAUSE_AFTER_CMD);
          return;
        }

        if (step.type === 'reveal') {
          const wrap = document.createElement('div');
          wrap.innerHTML = step.html;
          block.appendChild(wrap);
          block.appendChild(caret);
          await sleep(PAUSE_BETWEEN);
          return;
        }

        if (step.type === 'typeOut') {
          const p = document.createElement('p');
          p.className = step.className || 'out';
          block.appendChild(p);
          block.appendChild(caret);
          await typeInto(p, step.text, TEXT_SPEED);
          await sleep(PAUSE_BETWEEN);
          return;
        }
      }

      async function run() {
        for (const step of steps) {
          await runStep(step);
        }
        const finalBlock = document.createElement('div');
        finalBlock.className = 'block';
        const line = document.createElement('div');
        line.className = 'line';
        line.innerHTML = PROMPT_HTML;
        line.appendChild(caret);
        finalBlock.appendChild(line);
        screen.appendChild(finalBlock);
      }

      window.requestAnimationFrame(() => { run(); });
    })();
  </script>
</body>
</html>
